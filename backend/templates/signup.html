<!-- backend/templates/signup.html -->
{% extends "base.html" %}
{% block title %}Comemore+ - Criar conta{% endblock %}

{% block content %}
<style>
  body { background: linear-gradient(to right, #fce4ec, #e3f2fd); }
  .card-box {
    background: #fff; padding: 30px; border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 440px;
  }
  .btn-primary-custom { background: #2e7d32; color: white; font-weight: 600; }
  .btn-primary-custom:hover { background: #1b5e20; color: white; }
</style>

<div class="container d-flex flex-column align-items-center justify-content-center"
     style="min-height: 90vh;">
  <h1 style="font-weight:700;font-size:2rem;color:#2c3e50;margin-bottom:20px;">
    Comemore+
  </h1>

  <div class="card-box">
    <h4 class="mb-1 text-center">Criar conta</h4>
    <p class="text-muted text-center small mb-4">
      Comece de graça. Crie seu primeiro convite em minutos.
    </p>

    <form method="POST" action="{{ url_for('signup') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Seu nome (anfitrião)</label>
        <input type="text" name="nome_anfitriao" class="form-control" required autofocus
               placeholder="Ex.: Maria Silva" minlength="2">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required
               placeholder="seu@email.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-control" required
               minlength="8" placeholder="Mínimo 8 caracteres">
      </div>

      <div class="mb-4">
        <label class="form-label">Confirmar senha</label>
        <input type="password" name="confirm_password" class="form-control" required
               minlength="8" placeholder="Repita a senha">
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary-custom">Criar conta</button>
      </div>

      <div class="text-center">
        <a href="{{ url_for('login') }}" class="text-muted small">
          Já tem conta? Faça login
        </a>
      </div>
    </form>
  </div>

  <div class="mt-3 text-muted small">{{ app_version }}</div>
</div>
{% endblock %}

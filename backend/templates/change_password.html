<!-- backend/templates/change_password.html -->

{% extends "base.html" %}
{% block title %}Comemore+ - Trocar Senha{% endblock %}

{% block content %}
<style>
  body { background: linear-gradient(to right, #fce4ec, #e3f2fd); }
  .box {
    background: #fff;
    padding: 32px;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,.1);
    width: 100%;
    max-width: 420px;
  }
</style>

<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 90vh;">
  <h1 class="mb-2 fw-bold" style="color: #2c3e50;">Comemore+</h1>

  <div class="box">
    <h4 class="mb-1 text-center">Trocar Senha</h4>
    <p class="text-muted text-center small mb-4">
      Sua senha foi resetada. Escolha uma nova senha para continuar.
    </p>

    <form method="POST" action="{{ url_for('change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label fw-500">Nova senha</label>
        <input type="password" name="new_password" class="form-control"
               required autocomplete="new-password" placeholder="Mínimo 8 caracteres">
      </div>
      <div class="mb-4">
        <label class="form-label fw-500">Confirmar nova senha</label>
        <input type="password" name="confirm_password" class="form-control"
               required autocomplete="new-password">
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary fw-semibold">Salvar Nova Senha</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('logout') }}" class="text-muted small">Sair</a>
    </div>
  </div>
</div>
{% endblock %}

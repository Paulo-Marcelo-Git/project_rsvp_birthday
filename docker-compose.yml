services:
  db:
    image: mysql:8
    container_name: rsvp_mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rsvp_net

  redis:
    image: redis:7-alpine
    container_name: rsvp_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - rsvp_net

  backend:
    build: ./backend
    container_name: rsvp_backend
    restart: always
    user: "1002:1002"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "127.0.0.1:3000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./logs:/app/logs
      - ./VERSION:/VERSION:ro
    working_dir: /app
    networks:
      - rsvp_net

  worker:
    build: ./backend
    container_name: rsvp_worker
    restart: always
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command: rq worker default
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./VERSION:/VERSION:ro
    working_dir: /app
    networks:
      - rsvp_net

  # Serviço exclusivo para testes de integração (nunca sobe com `docker compose up`).
  # Uso: docker compose --profile test run --rm backend-test
  #
  # TEST_DB_* usa prefixo próprio para não ser sobrescrito pelo conftest.py dos
  # testes unitários, que faz os.environ.update() com credenciais falsas (DB_*).
  backend-test:
    build: ./backend
    env_file:
      - .env
    environment:
      TEST_DB_HOST: db
      TEST_DB_USER: ${DB_USER}
      TEST_DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./VERSION:/VERSION:ro
    working_dir: /app
    command: >
      sh -c "pip install pytest==8.3.5 -q && python -m pytest -m integration -v --tb=short"
    networks:
      - rsvp_net
    profiles:
      - test

  backup:
    build:
      context: ./backup
    container_name: rsvp_backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rsvp_net

networks:
  rsvp_net:
    driver: bridge

volumes:
  db_data:
  backup_data:
  uploads_data:
  redis_data:

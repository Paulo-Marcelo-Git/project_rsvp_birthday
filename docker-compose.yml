services:
  db:
    image: mysql:8
    container_name: rsvp_mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rsvp_net

  backend:
    build: ./backend
    container_name: rsvp_backend
    restart: always
    user: "1002:1002"
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./VERSION:/VERSION:ro
    working_dir: /app
    command: >
      gunicorn app:app
      -w 2
      --threads 4
      -k gthread
      -b 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --access-logformat '%(t)s | %(p)s | %(m)s %(U)s | status=%(s)s | resp_time=%(L)s sec | size=%(B)s bytes'
    networks:
      - rsvp_net

  # Serviço exclusivo para testes de integração (nunca sobe com `docker compose up`).
  # Uso: docker compose --profile test run --rm backend-test
  #
  # TEST_DB_* usa prefixo próprio para não ser sobrescrito pelo conftest.py dos
  # testes unitários, que faz os.environ.update() com credenciais falsas (DB_*).
  backend-test:
    build: ./backend
    env_file:
      - .env
    environment:
      TEST_DB_HOST: db
      TEST_DB_USER: ${DB_USER}
      TEST_DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./VERSION:/VERSION:ro
    working_dir: /app
    command: >
      sh -c "pip install pytest==8.3.5 -q && python -m pytest -m integration -v --tb=short"
    networks:
      - rsvp_net
    profiles:
      - test

networks:
  rsvp_net:
    driver: bridge

volumes:
  db_data:
